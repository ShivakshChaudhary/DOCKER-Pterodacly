[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
loglevel=info

[program:dbus]
command=/usr/bin/dbus-daemon --system --nofork
priority=5
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:vnc]
command=/bin/bash -c "rm -rf /tmp/.X1-lock /tmp/.X11-unix/X1 && su - container -c 'vncserver :1 -geometry ${RESOLUTION:-1280x720} -depth 24 -localhost no'"
priority=10
autostart=true
autorestart=true
startsecs=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:novnc]
command=/usr/bin/websockify --web=/usr/share/novnc 6080 localhost:5901
priority=20
autostart=true
autorestart=true
startsecs=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:cleanup]
command=/bin/bash -c "while true; do rm -f /tmp/.X1-lock /tmp/.X11-unix/X1 2>/dev/null; sleep 60; done"
priority=30
autostart=true
autorestart=true
stdout_logfile=/dev/null
stderr_logfile=/dev/null

[group:desktop]
programs=dbus,vnc,novnc,cleanup
priority=999
